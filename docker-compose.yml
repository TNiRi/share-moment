services:
  db:
    image: postgres:17
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data:nocopy
    networks:
      - backend
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data
      POSTGRES_HOST_AUTH_METHOD: md5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8090:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    networks:
      - backend

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./proxy/certbot/webroot:/var/www/certbot
      - ./proxy/certbot/conf:/etc/letsencrypt
    networks:
      - backend
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  api:
    build: .
    container_name: api
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./.env:/usr/src/app/.env
    networks:
      - backend

  spa:
    build: ../share-moment-front
    container_name: spa
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - backend
    
networks:
  backend:
    driver: bridge

volumes:
  db_data:
    driver: local